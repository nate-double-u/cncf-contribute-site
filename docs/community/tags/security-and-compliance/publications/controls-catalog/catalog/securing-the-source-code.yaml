guidelines:
- id: CNSC-182
  objective: Commits and tags are signed
  title: Commit and Tag Signing
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - GPG keys or S/MIME certificates are used to sign the source code
- id: CNSC-183
  objective: Full attestation and verification is enforced for protected branches
  title: Branch Protection Attestation
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Branch protection is enabled on the mainline and release branches with force push disabled
- id: CNSC-184
  objective: Secrets are not committed to the source code repository unless encrypted
  title: Secret Commit Prevention
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Implement tooling to detect secrets or to prevent certain files from being pushed which may contain plaintext sensitive
    materials, such as via a .gitignore and/or .gitattributes file, client-side hook (pre-commit), server-side hook (pre-receive
    or update), and/or as a step in the CI process
- id: CNSC-185
  objective: Individuals or teams with write access to a repository are defined
  title: Repository Access Definition
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Implement codeowners (or equivalent)
- id: CNSC-186
  objective: Software security scanning and testing is automated
  title: Automated Security Scanning
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Security specific scans should be performed, including Static Application Security Tests (SAST) and Dynamic Application
    Security Tests (DAST). Both the coverage and results of these tests should be published as part of the repository information
    to help downstream consumers of software better assess the stability, reliability, and/or suitability of a product or
    library.
- id: CNSC-187
  objective: Contribution policies are established and adhered to
  title: Contribution Policy Enforcement
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Define configuration options or configuration rules witthin SCM platforms allow repository administrators to enforce security,
    hygiene and operational policies.
- id: CNSC-188
  objective: Roles are defined and aligned to functional responsibilities
  title: Functional Role Definition
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Define roles by using principle of least privileges to provide access based on function such as Developer, Maintainer,
    Owner, Reviewer, Approver, and Guest
- id: CNSC-189
  objective: An independent four-eyes principle is enforced
  title: Four-Eyes Principle
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - The author(s) of a request may not also be the approver of the request. At least two reviewers with equal or greater expertise
    should review & approve the request.
- id: CNSC-190
  objective: Branch protection rules are used
  title: Branch Protection Rules
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - SCM platforms allow the configuration and restriction of source code operations on individual branches. Protection rules
    can be used to enforce the usage of pull requests with specified precondition and approval rules, ensuring that a human
    code review process is followed or an automated status checking of a branch occurs. Additionally, protected branches can
    be used to disallow dangerous use of force pushes, preventing the overwrite of commit histories and potential obfuscation
    of code changes.
- id: CNSC-191
  objective: MFA is enforced for accessing source code repositories
  title: Repository MFA Enforcement
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
- id: CNSC-192
  objective: SSH keys are used to provide developers access to source code repositories
  title: SSH Key Access
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
- id: CNSC-193
  objective: A key rotation policy is maintained
  title: Key Rotation Policy
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - It is recommended to implement a key rotation policy to ensure that compromised keys will cease to be usable after a certain
    period of time. When a private key is known to have been compromised, it should be revoked and replaced immediately to
    shut off access for any unauthorized user. Organizations may also consider using short lived certificates or keys, which
    reduces the reliance on certificate revocation systems.
- id: CNSC-194
  objective: Short-lived or ephemeral credentials are used for machine and service access
  title: Ephemeral Credentials
  group: Securing the Source Code
  applicability:
  - SSCP-v1.0
  recommendations:
  - Short-life credential issuance encourages the use of fine grained permissions and automation in provisioning access tokens.
    For CI/CD pipeline agents, short-lived access tokens should be considered instead of password-based credentials. The use
    of very short-lived tokens like OAuth 2.0, OpenID Connect, etc., will help to implement more secure access and increase
    the security assurance.
