guidelines:
- id: CNSC-63
  objective: A dedicated production environment is established
  title: Production Environment
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Ensure that production workloads are in a separate, dedicated environment from non-production workloads. In the context
    of containers, this can mean separate clusters. In the case of VMs, separate networks.
- id: CNSC-64
  objective: Dynamic deployments are leveraged for safer releases
  title: Dynamic Deployments
  group: Develop
  applicability:
  - CNSWP-v1.0
  - CNSWP-v2.0
  recommendations:
  - Blue/Green, Alpha/Beta, Canary, red-black deployments
- id: CNSC-65
  objective: Vulnerability and configuration scanning is integrated in the IDE or at the pull request
  title: Early Vulnerability Scanning
  group: Develop
  applicability:
  - CNSWP-v1.0
- id: CNSC-66
  objective: Dedicated development, testing, and production environments are established
  title: Environment Segregation
